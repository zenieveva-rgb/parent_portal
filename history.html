<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance History - SecretaryWeb</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-qrcode"></i>
            <span>SecretaryWeb</span>
        </div>
        <div class="nav-buttons">
            <a href="index.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Scanner
            </a>
            <div id="userInfo" class="hidden" style="display: flex; align-items: center; gap: 1rem;">
                <span id="userEmail" style="color: var(--text-secondary);"></span>
                <button id="logoutBtn" class="btn btn-secondary">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="attendanceHistory">
            <div class="card">
                <h2 class="card-title">
                    <i class="fas fa-archive"></i>
                    Attendance Archive
                </h2>
                <div id="historyList" class="history-container">
                    <!-- History items will be loaded here -->
                    <p class="no-records">Loading attendance records...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
