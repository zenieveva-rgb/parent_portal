<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro | History Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--darker);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            transform: translateX(-5px);
        }

        .header-title {
            text-align: center;
            flex: 1;
        }

        .header-title h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title span {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .header-stats {
            display: flex;
            gap: 20px;
        }

        .stat-badge {
            padding: 10px 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            font-size: 0.9rem;
        }

        .stat-badge i {
            color: var(--primary);
            margin-right: 8px;
        }

        /* Alphabet Filter */
        .alphabet-filter {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .letter-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text-secondary);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .letter-btn:hover, .letter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        /* Search */
        .search-section {
            margin-bottom: 25px;
        }

        .search-box {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* Student Cards Grid */
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .student-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .student-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--gradient-1);
            transform: scaleY(0);
            transition: transform 0.3s;
        }

        .student-card:hover::before {
            transform: scaleY(1);
        }

        .student-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card-avatar {
            width: 60px;
            height: 60px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .card-info h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .card-info span {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .card-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .card-stat {
            text-align: center;
        }

        .card-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .card-stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9998;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            padding: 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .modal-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .modal-avatar {
            width: 50px;
            height: 50px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--glass);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 30px;
        }

        .logs-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border-left: 3px solid var(--primary);
        }

        .log-date {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
        }

        .log-date i {
            color: var(--accent);
        }

        .log-time {
            font-weight: 600;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        @media (max-width: 768px) {
            .students-grid {
                grid-template-columns: 1fr;
            }
            
            .page-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="main-container">
        <!-- Header -->
        <div class="page-header">
            <a href="index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Monitor
            </a>
            
            <div class="header-title">
                <h1><i class="fa-solid fa-box-archive" style="color: var(--primary);"></i> Attendance Archive</h1>
                <span>View complete attendance history by student</span>
            </div>
            
            <div class="header-stats">
                <div class="stat-badge">
                    <i class="fa-solid fa-users"></i>
                    <span id="totalStudents">0 Students</span>
                </div>
            </div>
        </div>

        <!-- Alphabet Filter -->
        <div class="alphabet-filter" id="alphabetFilter">
            <button class="letter-btn active" onclick="filterByLetter('all')">All</button>
            <!-- Generated by JS -->
        </div>

        <!-- Search -->
        <div class="search-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search students by name..." oninput="filterStudents()">
            </div>
        </div>

        <!-- Students Grid -->
        <div class="students-grid" id="studentsGrid">
            <div class="empty-state">
                <i class="fa-solid fa-box-open"></i>
                <h3>No Records Found</h3>
                <p>Student attendance history will appear here</p>
            </div>
        </div>
    </div>

    <!-- Student Detail Modal -->
    <div class="modal-overlay" id="studentModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">
                    <div class="modal-avatar" id="modalAvatar">J</div>
                    <div>
                        <h3 id="modalName">Student Name</h3>
                        <span style="color: var(--text-secondary); font-size: 0.9rem;" id="modalGrade">Grade --</span>
                    </div>
                </div>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="card-stats" style="margin-bottom: 25px;">
                    <div class="card-stat">
                        <div class="card-stat-value" id="modalTotalScans">0</div>
                        <div class="card-stat-label">Total Scans</div>
                    </div>
                    <div class="card-stat">
                        <div class="card-stat-value" id="modalLastScan">--</div>
                        <div class="card-stat-label">Last Active</div>
                    </div>
                </div>
                
                <h4 style="margin-bottom: 15px; color: var(--text-secondary);">
                    <i class="fa-solid fa-clock-rotate-left" style="margin-right: 8px;"></i>
                    Recent Activity
                </h4>
                <div class="logs-list" id="logsList">
                    <!-- Logs injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdlEvDlQ1qWr8xdL4bV25NW4RgcTajYqM",
            authDomain: "database-98a70.firebaseapp.com",
            databaseURL: "https://database-98a70-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "database-98a70",
            storageBucket: "database-98a70.firebasestorage.app",
            messagingSenderId: "460345885965",
            appId: "1:460345885965:web:8484da766b979a0eaf9c44"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let allStudents = [];
        let currentFilter = 'all';

        // Generate alphabet buttons
        function generateAlphabet() {
            const container = document.getElementById('alphabetFilter');
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter;
                btn.onclick = () => filterByLetter(letter);
                container.appendChild(btn);
            }
        }

        generateAlphabet();

        // Load attendance data
        function loadData() {
            const attendanceRef = ref(database, 'attendance');
            onValue(attendanceRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    processStudentData(data);
                } else {
                    document.getElementById('studentsGrid').innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-box-open"></i>
                            <h3>No Records Found</h3>
                            <p>Student attendance history will appear here</p>
                        </div>
                    `;
                }
            });
        }

        function processStudentData(data) {
            const students = {};
            
            Object.entries(data).forEach(([key, record]) => {
                const name = record.studentName || 'Unknown';
                if (!students[name]) {
                    students[name] = {
                        name: name,
                        grade: record.grade || 'N/A',
                        scans: [],
                        totalScans: 0
                    };
                }
                students[name].scans.push({
                    ...record,
                    key: key
                });
                students[name].totalScans++;
            });

            // Sort scans by date for each student
            Object.values(students).forEach(student => {
                student.scans.sort((a, b) => new Date(b.timestamp || b.time) - new Date(a.timestamp || a.time));
                student.lastScan = student.scans[0];
            });

            allStudents = Object.values(students).sort((a, b) => a.name.localeCompare(b.name));
            document.getElementById('totalStudents').textContent = `${allStudents.length} Students`;
            
            renderStudents(allStudents);
        }

        function renderStudents(students) {
            const grid = document.getElementById('studentsGrid');
            
            if (students.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-search"></i>
                        <h3>No students found</h3>
                        <p>Try adjusting your search</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = students.map((student, index) => `
                <div class="student-card" onclick="openStudentModal('${student.name}')" style="animation: fadeIn 0.4s ease forwards; animation-delay: ${index * 0.05}s">
                    <div class="card-header">
                        <div class="card-avatar">${student.name.charAt(0).toUpperCase()}</div>
                        <div class="card-info">
                            <h3>${student.name}</h3>
                            <span><i class="fa-solid fa-graduation-cap"></i> ${student.grade}</span>
                        </div>
                    </div>
                    <div class="card-stats">
                        <div class="card-stat">
                            <div class="card-stat-value">${student.totalScans}</div>
                            <div class="card-stat-label">Total Scans</div>
                        </div>
                        <div class="card-stat">
                            <div class="card-stat-value" style="font-size: 1rem;">${formatDate(student.lastScan?.timestamp || student.lastScan?.time)}</div>
                            <div class="card-stat-label">Last Seen</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.filterByLetter = (letter) => {
            currentFilter = letter;
            
            // Update active state
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === letter || (letter === 'all' && btn.textContent === 'All')) {
                    btn.classList.add('active');
                }
            });

            if (letter === 'all') {
                renderStudents(allStudents);
            } else {
                const filtered = allStudents.filter(s => s.name.charAt(0).toUpperCase() === letter);
                renderStudents(filtered);
            }
        };

        window.filterStudents = () => {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allStudents.filter(s => 
                s.name.toLowerCase().includes(searchTerm)
            );
            renderStudents(filtered);
        };

        window.openStudentModal = (studentName) => {
            const student = allStudents.find(s => s.name === studentName);
            if (!student) return;

            document.getElementById('modalAvatar').textContent = student.name.charAt(0).toUpperCase();
            document.getElementById('modalName').textContent = student.name;
            document.getElementById('modalGrade').textContent = student.grade;
            document.getElementById('modalTotalScans').textContent = student.totalScans;
            document.getElementById('modalLastScan').textContent = formatTime(student.lastScan?.timestamp || student.lastScan?.time);

            const logsList = document.getElementById('logsList');
            logsList.innerHTML = student.scans.slice(0, 10).map(scan => `
                <div class="log-item">
                    <div class="log-date">
                        <i class="fa-regular fa-calendar"></i>
                        ${formatDate(scan.timestamp || scan.time)}
                    </div>
                    <div class="log-time">${formatTime(scan.timestamp || scan.time)}</div>
                </div>
            `).join('');

            document.getElementById('studentModal').classList.add('active');
        };

        window.closeModal = () => {
            document.getElementById('studentModal').classList.remove('active');
        };

        function formatDate(timestamp) {
            if (!timestamp) return '--';
            const date = new Date(timestamp);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function formatTime(timestamp) {
            if (!timestamp) return '--:--';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-circle-exclamation'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        };

        // Close modal on backdrop click
        document.getElementById('studentModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        // Load data on page load
        loadData();
    </script>
</body>
</html>
