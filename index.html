<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretaryWeb QR Scanner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-qrcode"></i>
            <span>SecretaryWeb</span>
        </div>
        <div class="nav-buttons">
            <button id="loginBtn" class="btn btn-secondary">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <button id="signupBtn" class="btn btn-primary">
                <i class="fas fa-user-plus"></i> Sign Up
            </button>
            <div id="userInfo" class="hidden" style="display: flex; align-items: center; gap: 1rem;">
                <span id="userEmail" style="color: var(--text-secondary);"></span>
                <button id="logoutBtn" class="btn btn-secondary">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Pending Approval Status -->
        <div id="approvalStatus" class="hidden"></div>

        <!-- QR Scanner Section -->
        <div id="qrScanner" class="hidden">
            <div class="card">
                <h2 class="card-title">
                    <i class="fas fa-camera"></i>
                    QR Code Scanner
                </h2>
                <div class="scanner-container">
                    <div class="scanner-frame">
                        <div class="scanner-placeholder">
                            <i class="fas fa-camera-retro"></i>
                            <p>Camera preview will appear here</p>
                            <p style="font-size: 0.9rem; margin-top: 0.5rem;">Point your camera at a QR code</p>
                        </div>
                    </div>
                    <div id="scanResult"></div>
                </div>
            </div>

            <!-- Manual Attendance Button -->
            <div class="manual-attendance-wrapper">
                <button id="manualAttendanceBtn" class="btn btn-success">
                    <i class="fas fa-keyboard"></i>
                    Manual Attendance Entry
                </button>
            </div>
        </div>

        <!-- Attendance History -->
        <div id="attendanceHistory" class="hidden">
            <div class="card">
                <h2 class="card-title">
                    <i class="fas fa-history"></i>
                    Attendance History
                </h2>
                <div id="historyList" class="history-container">
                    <!-- History items will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <!-- PROFESSIONAL MANUAL ATTENDANCE MODAL -->
    <div id="manualAttendanceModal" class="manual-modal">
        <div class="manual-modal-content">
            <!-- Animated gradient border at top -->
            
            <div class="manual-header">
                <button id="closeManualModal" class="manual-close">
                    <i class="fas fa-times"></i>
                </button>
                
                <div class="manual-icon-wrapper">
                    <i class="fas fa-user-check"></i>
                </div>
                
                <h3 class="manual-title">Manual Attendance</h3>
                <p class="manual-subtitle">Enter student details manually</p>
            </div>

            <form id="manualAttendanceForm" class="manual-form">
                <!-- Error Message -->
                <div id="manualError" class="manual-message manual-error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span></span>
                </div>

                <!-- Success Message -->
                <div id="manualSuccess" class="manual-message manual-success">
                    <i class="fas fa-check-circle"></i>
                    <span></span>
                </div>

                <!-- Student ID Input -->
                <div class="input-group">
                    <input 
                        type="text" 
                        id="manualStudentId" 
                        class="manual-input" 
                        placeholder=" "
                        required
                        autocomplete="off"
                    >
                    <i class="fas fa-id-card"></i>
                    <label for="manualStudentId">Student ID</label>
                </div>

                <!-- Student Name Input -->
                <div class="input-group">
                    <input 
                        type="text" 
                        id="manualStudentName" 
                        class="manual-input" 
                        placeholder=" "
                        required
                        autocomplete="off"
                    >
                    <i class="fas fa-user"></i>
                    <label for="manualStudentName">Student Name</label>
                </div>

                <!-- Button Group -->
                <div class="manual-btn-group">
                    <button type="button" id="cancelManualBtn" class="manual-btn manual-btn-secondary">
                        <i class="fas fa-times"></i>
                        Cancel
                    </button>
                    <button type="submit" class="manual-btn manual-btn-primary">
                        <i class="fas fa-check"></i>
                        Record Attendance
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
