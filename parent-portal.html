<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal | Student Attendance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--darker);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        .main-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
        }

        .search-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .section-select {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }

        .section-select:focus {
            border-color: var(--primary);
        }

        .search-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .result-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            display: none;
        }

        .result-card.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .student-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .student-avatar {
            width: 100px;
            height: 100px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .student-name {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .student-section {
            color: var(--text-secondary);
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .status-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .status-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .status-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .status-present {
            color: var(--success);
        }

        .status-absent {
            color: var(--danger);
        }

        .history-section {
            margin-top: 25px;
        }

        .history-title {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-left: 3px solid var(--primary);
        }

        .history-date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .history-time {
            color: var(--success);
            font-weight: 600;
        }

        .not-found {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .not-found i {
            font-size: 4rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="main-container">
        <div class="header">
            <div class="header-icon">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h1>Parent Portal</h1>
            <p>Check your child's attendance status</p>
        </div>

        <div class="search-card" id="searchForm">
            <div class="input-group">
                <label class="input-label">Select Section</label>
                <select class="section-select" id="sectionSelect">
                    <option value="">Choose a section...</option>
                </select>
            </div>
            
            <div class="input-group">
                <label class="input-label">Student Name</label>
                <input type="text" class="search-input" id="studentNameInput" placeholder="Enter student's full name">
            </div>
            
            <button class="search-btn" onclick="searchStudent()">
                <i class="fa-solid fa-search"></i>
                Check Attendance
            </button>
        </div>

        <div class="result-card" id="resultCard">
            <!-- Results will appear here -->
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdlEvDlQ1qWr8xdL4bV25NW4RgcTajYqM",
            authDomain: "database-98a70.firebaseapp.com",
            databaseURL: "https://database-98a70-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "database-98a70",
            storageBucket: "database-98a70.firebasestorage.app",
            messagingSenderId: "460345885965",
            appId: "1:460345885965:web:8484da766b979a0eaf9c44"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Load sections
        async function loadSections() {
            const sectionsRef = ref(database, 'sections');
            const snapshot = await get(sectionsRef);
            const sections = snapshot.val() || {};
            
            const select = document.getElementById('sectionSelect');
            select.innerHTML = '<option value="">Choose a section...</option>';
            
            Object.entries(sections).forEach(([id, section]) => {
                const option = document.createElement('option');
                option.value = id;
                option.textContent = section.name;
                select.appendChild(option);
            });
        }

        loadSections();

        window.searchStudent = async () => {
            const sectionId = document.getElementById('sectionSelect').value;
            const studentName = document.getElementById('studentNameInput').value.trim().toLowerCase();

            if (!sectionId || !studentName) {
                showToast('Please select a section and enter student name', 'error');
                return;
            }

            try {
                // Search in attendance
                const attendanceRef = ref(database, `sections/${sectionId}/attendance`);
                const attendanceSnap = await get(attendanceRef);
                const attendanceData = attendanceSnap.val() || {};

                // Find student by name (case-insensitive)
                const studentRecords = Object.entries(attendanceData).filter(([key, record]) => 
                    record.studentName?.toLowerCase() === studentName
                );

                // Also check masterlist
                const masterlistRef = ref(database, `sections/${sectionId}/masterlist`);
                const masterlistSnap = await get(masterlistRef);
                const masterlistData = masterlistSnap.val() || {};

                const masterStudent = Object.entries(masterlistData).find(([key, record]) => 
                    record.studentName?.toLowerCase() === studentName
                );

                if (studentRecords.length > 0) {
                    // Student found in attendance (present)
                    const latestRecord = studentRecords[studentRecords.length - 1][1];
                    showStudentResult(sectionId, latestRecord, studentRecords.length, true);
                } else if (masterStudent) {
                    // Student in masterlist but not scanned (absent)
                    const [studentId, studentData] = masterStudent;
                    showStudentResult(sectionId, {
                        studentName: studentData.studentName,
                        studentId: studentId,
                        timestamp: null
                    }, 0, false);
                } else {
                    // Student not found
                    showNotFound();
                }

            } catch (error) {
                showToast(error.message, 'error');
            }
        };

        function showStudentResult(sectionId, student, totalPresent, isPresent) {
            const card = document.getElementById('resultCard');
            const sectionName = document.querySelector(`#sectionSelect option[value="${sectionId}"]`)?.textContent || sectionId;
            
            const statusClass = isPresent ? 'status-present' : 'status-absent';
            const statusText = isPresent ? 'PRESENT' : 'ABSENT';
            const timeText = student.timestamp ? formatTime(student.timestamp) : '--:--';

            card.innerHTML = `
                <div class="student-header">
                    <div class="student-avatar">${student.studentName.charAt(0).toUpperCase()}</div>
                    <div class="student-name">${student.studentName}</div>
                    <div class="student-section">
                        <i class="fa-solid fa-graduation-cap"></i> ${sectionName}
                    </div>
                </div>
                
                <div class="status-grid">
                    <div class="status-box">
                        <div class="status-label">Status</div>
                        <div class="status-value ${statusClass}">
                            <i class="fa-solid ${isPresent ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${statusText}
                        </div>
                    </div>
                    <div class="status-box">
                        <div class="status-label">Time</div>
                        <div class="status-value" style="color: var(--accent);">
                            <i class="fa-regular fa-clock"></i>
                            ${timeText}
                        </div>
                    </div>
                </div>

                <button class="back-btn" onclick="resetSearch()" style="width: 100%; justify-content: center;">
                    <i class="fa-solid fa-arrow-left"></i>
                    Search Another Student
                </button>
            `;
            
            card.classList.add('show');
            document.getElementById('searchForm').style.display = 'none';
        }

        function showNotFound() {
            const card = document.getElementById('resultCard');
            card.innerHTML = `
                <div class="not-found">
                    <i class="fa-solid fa-user-xmark"></i>
                    <h3>Student Not Found</h3>
                    <p>No student found with that name in the selected section.</p>
                    <button class="back-btn" onclick="resetSearch()" style="margin-top: 20px;">
                        <i class="fa-solid fa-arrow-left"></i>
                        Try Again
                    </button>
                </div>
            `;
            card.classList.add('show');
            document.getElementById('searchForm').style.display = 'none';
        }

        window.resetSearch = () => {
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('searchForm').style.display = 'block';
            document.getElementById('studentNameInput').value = '';
            document.getElementById('sectionSelect').value = '';
        };

        function formatTime(timestamp) {
            if (!timestamp) return '--:--';
            return new Date(timestamp).toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });
        }

        window.showToast = (message, type = 'info') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-circle-exclamation'
            };
            
            toast.innerHTML = `
                <i class="fa-solid ${icons[type]}"></i>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        };
    </script>
</body>
</html>
